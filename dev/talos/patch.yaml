# Talos machine-config patch for the Talos-in-Docker lab (quick-mode / no-KVM).
# Applied by dev/lab/remote-up.sh at `talosctl cluster create`. Values that would
# differ per environment belong in the overlay, not here — this is the minimal set
# the docker provisioner needs for the sandbox.
machine:
  # No SSH on Talos; the API is our only door. Allow the tunnel host to validate TLS.
  certSANs:
    - 127.0.0.1
    - localhost
  features:
    # tuppr prerequisite — cheaper to grant now than to re-apply later (pilot plan Phase 3).
    kubernetesTalosAPIAccess:
      enabled: true
      allowedRoles:
        - os:reader
      allowedKubernetesNamespaces:
        - system-upgrade
  kubelet:
    extraMounts:
      # CDI scratch space (local-path-provisioner).
      - destination: /var/local-path-provisioner
        type: bind
        source: /var/local-path-provisioner
        options: [bind, rshared, rw]
cluster:
  allowSchedulingOnControlPlanes: true
  # OIDC for kubectl (kubelogin) — issuer/clientID are overlay values, filled at Stage 6.
  # apiServer:
  #   extraArgs:
  #     oidc-issuer-url: https://id.<lab-host>.sslip.io/realms/platform
  #     oidc-client-id: kubernetes
  #     oidc-groups-claim: groups
