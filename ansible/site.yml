---
# Talu no-KVM lab — full install, idempotent. Encodes the validated procedure (see CLAUDE.md).
#   ansible-playbook site.yml
# Tags let you run a slice, e.g.: ansible-playbook site.yml --tags storage
- name: Talu no-KVM lab install
  hosts: lab
  gather_facts: true
  roles:
    - { role: host_bootstrap, tags: [bootstrap] }   # MTU-first, podman, modules, sysctls, tooling
    - { role: talos_cluster,  tags: [cluster] }      # talosctl cluster create docker (podman), cni=none
    - { role: cilium,         tags: [cilium] }       # CNI: kube-proxy replacement, bpf.masquerade, MTU
    - { role: cluster_dns,    tags: [dns] }          # CoreDNS -> public forwarders (pods need external DNS)
    - { role: core_services,  tags: [core] }         # local-path (default SC) + cert-manager internal CA
    - { role: storage_ceph,   tags: [storage] }      # MicroCeph + CephFS (RWX) + ceph-csi
    - { role: kubevirt,       tags: [kubevirt] }     # KubeVirt (useEmulation) + CDI
    # Stage 6 — identity & access plane (validated end-to-end; CLAUDE.md #16-#23).
    - { role: secrets_openbao,   tags: [stage6, openbao] }   # OpenBao SSH CA (dev-mode; #21)
    - { role: identity_dex,      tags: [stage6, dex] }       # tiny OIDC IdP (#16)
    - { role: kubevirt_manager,  tags: [stage6, kvmanager] } # VM web UI on the floating IP (#22)
    - { role: identity_pomerium, tags: [stage6, pomerium] }  # IAP: OIDC->Dex, autocert, socat expose (#17,#18,#18b)
    # identity_keycloak remains as reference but is disabled (Keycloak too heavy for the lab — #16).
