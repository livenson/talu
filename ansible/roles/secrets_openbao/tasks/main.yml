---
# Stage 6b: OpenBao SSH CA (gotcha #21). Dev-mode = IN-MEMORY: a pod restart wipes the mount/role,
# so the config tasks are idempotent AND self-healing (they re-apply if the engine/role went away).
# Production replaces this with Raft storage + unseal (plan §6).
- name: Namespace openbao
  ansible.builtin.command: "kubectl create ns openbao --dry-run=client -o yaml"
  register: ns_openbao
  changed_when: false

- name: Apply openbao namespace
  ansible.builtin.shell: "echo '{{ ns_openbao.stdout }}' | kubectl apply -f -"
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: false

- name: OpenBao Deployment + Service (dev mode)
  ansible.builtin.shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata: { name: openbao, namespace: openbao }
    spec:
      replicas: 1
      selector: { matchLabels: { app: openbao } }
      template:
        metadata: { labels: { app: openbao } }
        spec:
          containers:
            - name: openbao
              image: ghcr.io/openbao/openbao:{{ openbao_version }}
              args: ["server", "-dev", "-dev-root-token-id=root", "-dev-listen-address=0.0.0.0:8200"]
              ports: [{ containerPort: 8200 }]
    ---
    apiVersion: v1
    kind: Service
    metadata: { name: openbao, namespace: openbao }
    spec: { selector: { app: openbao }, ports: [{ port: 8200, targetPort: 8200 }] }
    EOF
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  register: bao_deploy
  changed_when: "'configured' in bao_deploy.stdout or 'created' in bao_deploy.stdout"

- name: Wait for OpenBao ready
  ansible.builtin.command: "kubectl -n openbao rollout status deploy/openbao --timeout=120s"
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: false

- name: Is the SSH CA already configured? (idempotence + dev-mode self-heal)
  ansible.builtin.command: >
    kubectl -n openbao exec deploy/openbao -- sh -c
    'export BAO_ADDR=http://127.0.0.1:8200 BAO_TOKEN=root; bao read -field=public_key ssh/config/ca'
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  register: bao_ca
  changed_when: false
  failed_when: false

- name: Enable SSH secrets engine + generate the CA signing key
  ansible.builtin.command: >
    kubectl -n openbao exec deploy/openbao -- sh -c
    'export BAO_ADDR=http://127.0.0.1:8200 BAO_TOKEN=root;
     bao secrets enable -path=ssh ssh; bao write ssh/config/ca generate_signing_key=true'
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  when: bao_ca.rc != 0
  changed_when: true

- name: Does the ssh role exist?
  ansible.builtin.command: >
    kubectl -n openbao exec deploy/openbao -- sh -c
    'export BAO_ADDR=http://127.0.0.1:8200 BAO_TOKEN=root; bao read ssh/roles/{{ openbao_ssh_principal }}'
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  register: bao_role
  changed_when: false
  failed_when: false

- name: Create the ssh role (JSON payload — 'default_extensions' map rejects k=v CLI form, gotcha #21)
  # kubectl exec -i pipes the JSON on stdin into `bao write ... -`.
  ansible.builtin.shell: |
    cat <<'JSON' | kubectl -n openbao exec -i deploy/openbao -- sh -c \
      'export BAO_ADDR=http://127.0.0.1:8200 BAO_TOKEN=root; bao write ssh/roles/{{ openbao_ssh_principal }} -'
    {"key_type":"ca","allow_user_certificates":true,"allowed_users":"{{ openbao_ssh_principal }},alice","default_user":"{{ openbao_ssh_principal }}","ttl":"15m","allowed_extensions":"permit-pty","default_extensions":{"permit-pty":""}}
    JSON
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  when: bao_role.rc != 0
  changed_when: true
