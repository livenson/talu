---
# Logging / audit tier: Loki (store) + Grafana Alloy (collector). The per-user "who accessed what,
# when" audit is surfaced NATIVELY IN PERSES (LokiDatasource + LogsTable plugins) — no Grafana. Mirrors
# components/platform/logging/. Deployed with helm/kubectl (no flux helm-controller on the lab).
- name: Logging component dir (on the lab, from the synced repo)
  ansible.builtin.set_fact:
    log_dir: "{{ playbook_dir }}/../components/platform/logging"

- name: Apply the logging namespace
  ansible.builtin.command: "kubectl apply -f {{ log_dir }}/namespace.yaml"
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: true

- name: Add grafana helm repo (for the Loki + Alloy charts)
  ansible.builtin.shell: |
    helm repo add grafana https://grafana.github.io/helm-charts >/dev/null 2>&1 || true
    helm repo update grafana >/dev/null
  changed_when: false

- name: Install/upgrade Loki (log store — SingleBinary + filesystem)
  ansible.builtin.command: >
    helm upgrade --install loki grafana/loki
    --version {{ loki_chart_version }} --namespace logging
    -f {{ log_dir }}/loki-values.yaml --wait --timeout 8m
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: true

- name: Install/upgrade Grafana Alloy (collector — reads pod logs via the K8s API → Loki)
  ansible.builtin.command: >
    helm upgrade --install alloy grafana/alloy
    --version {{ alloy_chart_version }} --namespace logging
    -f {{ log_dir }}/alloy-values.yaml --wait --timeout 4m
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: true

# The audit view lives in Perses: a Loki datasource (proxy) + a LogsTable dashboard. These target the
# operator Perses server in the monitoring namespace, so the monitoring role must have run first.
- name: Wire the audit view into Perses (Loki datasource + LogsTable dashboard)
  ansible.builtin.command: "kubectl apply -f {{ log_dir }}/{{ item }}"
  loop:
    - loki-datasource.yaml
    - dashboard-audit.yaml
  environment: { KUBECONFIG: "{{ kubeconfig_path }}" }
  changed_when: true
