# Talu no-KVM lab install variables. See CLAUDE.md for why each value matters.
primary_iface_mtu: 1400          # host path carries ~1400B; must set BEFORE the container engine (gotcha #1)
cluster_name: talu-lab
cp_memory_mib: 16384             # Talos node RAM (Ceph/KubeVirt need headroom; default 2G too small)
cp_cpus: "6.0"
podman_socket: "unix:///run/podman/podman.sock"   # talosctl docker provisioner -> podman API (gotcha: Rocky 10 nftables)
lab_home: /home/rocky
kubeconfig_path: /home/rocky/.talu/kubeconfig

cilium_version: "1.19.6"          # multi-pool IPAM GA; bump via -f values (NOT --reuse-values, gotcha #24)
cilium_mtu: 1300                 # 1300 + VXLAN 50 < host 1400
# Cilium/Hubble values enable ServiceMonitors, so the prometheus-operator CRDs must exist BEFORE
# Cilium installs — but the monitoring stack deploys later (chicken-and-egg on a fresh cluster).
# The cilium role applies these CRDs first. Keep in step with the kube-prometheus-stack app version
# (chart 87.17.0 == prometheus-operator v0.92.1); the monitoring HelmRelease later reconciles them.
prometheus_operator_crd_version: "v0.92.1"
dns_forwarders: "8.8.8.8 1.1.1.1"   # CoreDNS default upstream is unusable here (gotcha #12)

ceph_rbd_pool: kubernetes
cephfs_name: talufs
enable_host_dev_nbd: false        # partial fix only; CephFS is the reliable path (gotcha #14/#15)

kubevirt_use_emulation: true      # no /dev/kvm
cdi_scratch_storageclass: local-path

# Observability + backup (deployed via helm/kubectl — no flux helm-controller on the nested node)
kube_prometheus_stack_version: "87.17.0"   # app v0.92.1; Prometheus-only (Grafana/Alertmanager off)
perses_operator_version: "0.4.0"           # dashboards-as-code operator
velero_chart_version: "12.1.0"             # app v1.18.1
garage_capacity: "50G"                     # Garage layout capacity for the single lab node
loki_chart_version: "7.1.0"                # app 3.6.8 — the audit log store (SingleBinary); the
                                           # audit VIEW is native Perses (LokiDatasource+LogsTable), no Grafana
alloy_chart_version: "1.10.1"              # app v1.17.1 — log collector (reads pod logs via K8s API)

# --- Stage 6: identity & access plane (Dex + Pomerium Native SSH + kubevirt-manager) ---
lab_floating_ip: "193.40.155.97"                         # OpenStack floating IP — MUST match the real VM
                                                         # (was the 203.0.113.10 example placeholder; a stale
                                                         # value makes Dex's issuer domain wrong → Pomerium
                                                         # sign-in 500s "issuer URL did not match"). Keep in
                                                         # sync with env.sh LAB_SSH on every VM reinstall.
lab_domain: "{{ lab_floating_ip | replace('.', '-') }}.sslip.io"
talos_node_ip: "10.5.0.2"                                 # Talos-in-podman controlplane IP (docker provisioner default)

dex_version: "v2.45.1"
dex_user_email: "alice@talu.local"
dex_user_name: "alice"
# bcrypt of the demo password (regenerate: htpasswd -nbBC 10 x <pw> | cut -d: -f2 | sed 's/^$2y/$2a/')
dex_user_bcrypt: "$2a$10$Yq.nLkSyi65yz/8AdmXpW.FEgnh6qXPfmuJDKLDDz67UoJJJKlpea"

pomerium_version: "v0.33.0"
pomerium_idp_client_secret: "pomerium-secret-lab"
pomerium_nodeport_https: 30443
pomerium_nodeport_http: 30080
pomerium_nodeport_ssh: 30022
pomerium_ssh_host_port: 23        # dedicated SG-open port for Pomerium native SSH (was :80 before 23 opened)

kubevirt_manager_version: "v1.5.4"
