# Internal CA chain: a self-signed root bootstraps a CA Certificate, which backs the
# `talu-ca` ClusterIssuer that every platform service gets its TLS from.
# (The cert-manager operator itself is installed from its release manifest / helm chart —
# see README; these issuers are the reusable platform config.)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: talu-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: talu-internal-ca
  secretName: talu-ca-tls
  duration: 87600h        # 10y root; rotate via overlapping roots (bake new + old)
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: talu-ca
spec:
  ca:
    secretName: talu-ca-tls
