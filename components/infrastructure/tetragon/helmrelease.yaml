apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: tetragon
spec:
  interval: 1h
  install:
    crds: CreateReplace              # ships the TracingPolicy CRDs
    createNamespace: false           # namespace.yaml owns it (PSA privileged label)
    remediation: { retries: 3 }
  upgrade:
    crds: CreateReplace
    remediation: { retries: 3 }
  chart:
    spec:
      chart: tetragon
      version: "1.7.0"               # app v1.7.0
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: tetragon
  # Base (Talos-tuned) values in values.yaml; environment overlays deep-merge tetragon-values-env.
  valuesFrom:
    - kind: ConfigMap
      name: tetragon-values
      valuesKey: values.yaml
    - kind: ConfigMap
      name: tetragon-values-env
      valuesKey: values.yaml
      optional: true
