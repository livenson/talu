{{- $root := . -}}
{{- $ns := .Values.slug -}}
{{- range $name, $vm := .Values.vms }}
{{- $vm = $vm | default dict -}}
{{- $principal := $vm.principal | default $root.Values.defaults.principal -}}
{{- $image := $vm.image | default $root.Values.defaults.image -}}
{{- $memory := $vm.memory | default $root.Values.defaults.memory -}}
{{- $source := $vm.source | default $root.Values.defaults.source -}}
{{- $ds := $vm.dataSource | default $root.Values.defaults.dataSource -}}
{{- $dsNs := $vm.dataSourceNamespace | default $root.Values.defaults.dataSourceNamespace -}}
{{- $rootSize := $vm.rootDiskSize | default $root.Values.defaults.rootDiskSize -}}
---
# Cloud-init lives in a Secret (guest secrets stay out of the VM manifest; the manager writes it).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-userdata
  namespace: {{ $ns }}
  labels:
    talu.io/vm: {{ $name | quote }}
    {{- include "talu-tenant.labels" $root | nindent 4 }}
type: Opaque
stringData:
  userdata: |
    #cloud-config
    users:
      - name: {{ $principal }}
        sudo: ALL=(ALL) NOPASSWD:ALL
        shell: /bin/bash
        lock_passwd: true
    {{- if $root.Values.caTrust.package }}
    # SSH User CA trust via the talu-ca-trust PACKAGE (rotatable — see dev/lab/ca-rotate.sh). dpkg owns
    # /etc/ssh/talu_ca.pub, so a CA rotation is just a package upgrade (unattended-upgrades pulls it),
    # never a re-provision. The guest fetches it from the tenant's configured apt repo.
    apt:
      sources:
        talu-ca-trust:
          source: {{ required "caTrust.aptRepoLine is required when caTrust.package=true" $root.Values.caTrust.aptRepoLine | quote }}
    package_update: true
    packages:
      - talu-ca-trust
      - unattended-upgrades
    {{- end }}
    write_files:
    {{- if not $root.Values.caTrust.package }}
      # Fallback (default): hand-write the trust file from the current CA pubkey. Simple + repo-free, but
      # a CA rotation then needs the VM recreated. For rotatable, no-recreate trust set caTrust.package=true.
      - path: /etc/ssh/talu_ca.pub
        content: {{ required "sshUserCaPubKey is required (Pomerium User CA) unless caTrust.package=true" $root.Values.sshUserCaPubKey | trim | quote }}
        permissions: "0644"
      - path: /etc/ssh/sshd_config.d/60-talu-ca.conf
        content: |
          TrustedUserCAKeys /etc/ssh/talu_ca.pub
          PasswordAuthentication no
    {{- end }}
      # VM logs Tier 1 (default): stream the journal to the serial console. KubeVirt captures ttyS0 into
      # the virt-launcher guest-console-log container, which Alloy ships to Loki — labelled
      # namespace=<tenant>, vm=<name> by the platform (not the guest). Nothing to spoof.
      # We use a tiny `journalctl -f > /dev/console` SERVICE rather than journald's own ForwardToConsole:
      # the latter needs journald (re)started with the console attached, which is racy under cloud-init
      # (getty grabs /dev/ttyS0 first, and a late `systemctl restart systemd-journald` silently drops
      # forwarding). Writing to /dev/console (the kernel console multiplexer → ttyS0 via `console=ttyS0`)
      # from a dedicated service is deterministic and getty-independent. (See lab-notes #33.)
      - path: /etc/systemd/system/talu-console-logs.service
        permissions: "0644"
        content: |
          [Unit]
          Description=Talu: stream the journal to the serial console (KubeVirt guest-console-log capture)
          After=systemd-journald.service
          [Service]
          ExecStart=/bin/sh -c "exec journalctl -b -f -o short-iso --no-hostname -p {{ $root.Values.logging.consoleLevel | default "info" }} > /dev/console 2>&1"
          Restart=always
          RestartSec=2
          [Install]
          WantedBy=multi-user.target
    {{- if $vm.guestSecrets }}
      - path: /etc/talu/app.env
        permissions: "0600"
        content: |
          {{- $vm.guestSecrets | nindent 10 }}
    {{- end }}
    {{- if $root.Values.logging.agent }}
      # VM logs Tier 2 (opt-in): the in-guest agent (Fluent Bit, baked into the golden image) tails
      # journald + any extra paths and PUSHES to this tenant's ingest gateway — never to Loki directly.
      # The gateway (not the guest) stamps the tenant namespace, so nothing here is trust-bearing.
      - path: /etc/fluent-bit/talu.conf
        permissions: "0644"
        content: |
          [SERVICE]
              flush        5
              daemon       off
              log_level    info
              parsers_file parsers.conf
          [INPUT]
              name         systemd
              tag          host.journal
              read_from_tail on
          {{- range $i, $p := ($root.Values.logging.paths | default list) }}
          [INPUT]
              name         tail
              tag          host.file
              path         {{ $p }}
          {{- end }}
          [OUTPUT]
              name         loki
              match        *
              host         logs-gateway.{{ $ns }}.svc.cluster.local
              port         3100
              # vm scopes WITHIN this tenant only; the gateway overwrites namespace regardless.
              labels       vm={{ $name }}, job=guest-agent
    {{- end }}
    runcmd:
      - systemctl restart ssh
      - systemctl daemon-reload
      - systemctl enable --now talu-console-logs.service
    {{- if $root.Values.caTrust.package }}
      # Auto-update the CA-trust package (reboot-less rotation): allow unattended-upgrades from this repo.
      # `origin=` matches the Release `Origin:` field the apt-reindex.sh writes (default talu).
      - printf 'Unattended-Upgrade::Origins-Pattern { "origin=%s"; };\nAPT::Periodic::Update-Package-Lists "1";\nAPT::Periodic::Unattended-Upgrade "1";\n' "{{ $root.Values.caTrust.aptOrigin | default "talu" }}" > /etc/apt/apt.conf.d/51talu-ca
      - systemctl enable --now unattended-upgrades || true
    {{- end }}
    {{- if $root.Values.logging.agent }}
      # Enable the baked-in agent. `|| true` so a base image without Fluent Bit still boots (Tier 1
      # keeps working); the golden image (images/*/Containerfile) bakes fluent-bit for full Tier 2.
      - systemctl enable --now fluent-bit --no-block || true
    {{- end }}
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    talu.io/vm: {{ $name | quote }}
    {{- include "talu-tenant.labels" $root | nindent 4 }}
spec:
  runStrategy: Always
  {{- if eq $source "dataSource" }}
  # Persistent root disk cloned from the golden-image DataSource (CDI). New VMs get the latest patched
  # image automatically (the DataImportCron rolls the DataSource); the disk persists → bootc self-update.
  dataVolumeTemplates:
    - metadata:
        name: {{ $name }}-root
        labels:
          {{- include "talu-tenant.labels" $root | nindent 10 }}
      spec:
        sourceRef:
          kind: DataSource
          name: {{ $ds | quote }}
          namespace: {{ $dsNs | quote }}
        storage:
          resources: { requests: { storage: {{ $rootSize }} } }
  {{- end }}
  template:
    metadata:
      labels:
        kubevirt.io/vm: {{ $name }}
        talu.io/project-uuid: {{ $root.Values.projectUuid | quote }}
    spec:
      domain:
        devices:
          disks:
            - { name: rootdisk, disk: { bus: virtio } }
            - { name: cloudinit, disk: { bus: virtio } }
          interfaces: [{ name: default, masquerade: {} }]
        resources: { requests: { memory: {{ $memory }} } }
      networks: [{ name: default, pod: {} }]
      volumes:
        {{- if eq $source "dataSource" }}
        - name: rootdisk
          dataVolume: { name: {{ $name }}-root }
        {{- else }}
        - name: rootdisk
          containerDisk: { image: {{ $image }} }
        {{- end }}
        - name: cloudinit
          cloudInitNoCloud:
            secretRef: { name: {{ $name }}-userdata }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-ssh
  namespace: {{ $ns }}
  labels:
    talu.io/ssh-expose: "true"
    talu.io/vm: {{ $name | quote }}
    {{- include "talu-tenant.labels" $root | nindent 4 }}
  annotations:
    # per-tenant SSH allow-list read by the Pomerium route renderer (annotation: emails have '@')
    talu.io/allowed-users: {{ join "," $root.Values.allowedUsers | quote }}
spec:
  selector: { kubevirt.io/vm: {{ $name }} }
  ports: [{ name: ssh, port: 22, targetPort: 22 }]
---
# Pin the VM's :22 so ONLY Pomerium can reach it (defense in depth behind the SSH gate).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}-ssh-pin
  namespace: {{ $ns }}
  labels:
    talu.io/vm: {{ $name | quote }}
    {{- include "talu-tenant.labels" $root | nindent 4 }}
spec:
  endpointSelector: { matchLabels: { kubevirt.io/vm: {{ $name }} } }
  ingress:
    - fromEndpoints:
        - matchLabels: { k8s:io.kubernetes.pod.namespace: pomerium }
      toPorts: [{ ports: [{ port: "22", protocol: TCP }] }]
{{- end }}
