# Talu native tenant bundle — the manager-agnostic tenant API. A tenant (and its VMs) is a
# values file under environments/<site>/tenants/, reconciled by Flux. Every rendered object
# carries talu.io/project-uuid — the join key any external orchestrator reconciles on.
#
# SSH access is Pomerium Native SSH: each VM's Service is labelled talu.io/ssh-expose and
# annotated talu.io/allowed-users, and the Pomerium config renderer turns that into an
# ssh://<vm> route scoped to the tenant's members (see components/platform/access/).

projectUuid: ""            # REQUIRED, e.g. 3f2a91bc-...  -> talu.io/project-uuid on every object
slug: ""                   # REQUIRED, the tenant namespace name; frozen at creation (survives renames)

# Tenant members — emails that may SSH into this tenant's VMs (Pomerium per-route policy) and,
# where apiserver OIDC is wired, hold the scoped RBAC role in this namespace.
allowedUsers: []           # e.g. [alice@talu.local]

# Pomerium SSH User CA public key the VMs trust (TrustedUserCAKeys). In-cluster this comes from
# ConfigMap pomerium/pomerium-user-ca; set it here (the manager injects it) or via HelmRelease valueFrom.
sshUserCaPubKey: ""

# Defaults applied to each VM unless the per-VM entry overrides them.
defaults:
  # Root disk source (standalone-first: default is containerDisk, which needs no catalog):
  #   containerDisk -> ephemeral, boots straight from a registry image; reset on restart. Works out of
  #                    the box (a bare install has no golden-image catalog). Patched by bumping the tag.
  #   dataSource    -> OPT-IN. Persistent DataVolume cloned from a golden-image DataSource. New VMs get
  #                    the latest patched image automatically (a CDI DataImportCron rolls the DataSource),
  #                    and the disk survives reboot so bootc self-update sticks. Requires the golden-image
  #                    catalog (components/infrastructure/cdi/ + zot). Set at the site or per VM.
  source: containerDisk
  image: quay.io/containerdisks/ubuntu:24.04   # used when source=containerDisk (OpenSSH guest)
  dataSource: ubuntu                           # DataSource name (used when source=dataSource)
  dataSourceNamespace: golden-images
  rootDiskSize: 10Gi                           # persistent root PVC size (source=dataSource)
  memory: 1536Mi
  principal: talu                              # guest OS user / cert principal

# VMs this tenant owns: name -> spec. Each renders a cloud-init Secret + VirtualMachine +
# ssh Service (labelled/annotated) + CiliumNetworkPolicy pin.
vms: {}
#   web1:
#     principal: bob            # optional (else defaults.principal)
#     image: quay.io/...        # optional (else defaults.image)
#     memory: 2Gi               # optional (else defaults.memory)
#     guestSecrets: |           # optional — written to /etc/talu/app.env in the guest
#       DB_PASSWORD=s3cr3t
#       API_TOKEN=tok_abc

# Per-tenant guardrails. resourceQuota is a DEFAULT (always rendered) so every tenant has a metering
# envelope — `kube_resourcequota` then yields per-namespace utilisation for dashboards/accounting.
# Override the numbers per tenant, or set `resourceQuota: {}` to opt out entirely.
resourceQuota:
  requests.cpu: "8"
  requests.memory: 16Gi
  requests.storage: 200Gi
  persistentvolumeclaims: "10"
  count/virtualmachines.kubevirt.io: "10"

# Per-tenant dashboards: a namespace-scoped Perses + prom-label-proxy stack, reachable only via
# Pomerium. Off by default (each enabled tenant adds ~2 small pods). Data isolation is enforced by
# prom-label-proxy hardcoding namespace=<slug>, so the tenant can only ever see their own metrics.
dashboards:
  enabled: false
  persesImage: docker.io/persesdev/perses:v0.53.0
  proxyImage: quay.io/prometheuscommunity/prom-label-proxy:v0.11.1
  prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
internalIpPool: ""         # tier-1 CiliumLoadBalancerIPPool CIDR for this tenant (empty = feature off)

# Security groups: cloud-style ingress/egress allow-rules attached to VMs -> CiliumNetworkPolicy.
# Managed via the tenant API (edit values), alongside the always-on <vm>-ssh-pin.
securityGroups: {}
#   web:
#     vms: [app1]          # VMs it applies to (kubevirt.io/vm); omitted/[] = all VMs in the tenant
#     ingress:
#       - ports: [{ port: 80, protocol: TCP }, { port: 443, protocol: TCP }]
#         fromCIDR: ["0.0.0.0/0"]
#     egress:
#       - toCIDR: ["0.0.0.0/0"]      # allow all egress (omit to keep default)

# Scoped RBAC: bind allowedUsers to a namespace-admin Role (needs apiserver OIDC to actually log in).
rbac:
  enabled: true
