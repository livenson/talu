# Minimal VALID values for `helm lint` / `helm template` in CI. The chart's default values.yaml is
# intentionally incomplete (projectUuid/slug/sshUserCaPubKey are filled per tenant), which fails the
# values.schema.json on its own — so CI overlays these placeholders. Not used at runtime.
projectUuid: "aaaaaaaa-1111-2222-3333-444444444444"
slug: citest
sshUserCaPubKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILINTonlyPlaceholderKeyNotARealCA citest"
vms:
  app1:
    principal: alice
dashboards:
  enabled: true
logging:
  agent: true
