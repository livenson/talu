# route-sync — the one cross-cutting reconcile no chart/HelmRelease can own: the Pomerium routes live
# in a shared config blob, so a periodic job renders them from labelled Services — one ssh://<vm> route
# per talu.io/ssh-expose Service and one https://<ns>-dashboard route per talu.io/dashboard-expose
# Service (allow-list from each Service's talu.io/allowed-users annotation), on top of the base HTTP
# routes + SSH-server block. This is dev/lab/expose-vm.sh step-2, promoted in-cluster.
# (A watch-based controller — or Pomerium Ingress mode making routes objects — is the cleaner long-term.)
apiVersion: v1
kind: ServiceAccount
metadata: { name: route-sync, namespace: pomerium }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: talu-route-sync }
rules:
  - { apiGroups: [""], resources: [services], verbs: [get, list] }
  - { apiGroups: [""], resources: [configmaps], verbs: [get, update, patch] }
  - { apiGroups: [apps], resources: [deployments], verbs: [get, patch] }
  - { apiGroups: [apps], resources: [deployments/scale], verbs: [patch] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: talu-route-sync }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: talu-route-sync }
subjects: [{ kind: ServiceAccount, name: route-sync, namespace: pomerium }]
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: route-sync, namespace: pomerium }
spec:
  schedule: "*/2 * * * *"       # periodic reconcile; tighten/loosen as needed
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: route-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: docker.io/bitnami/kubectl:latest
              env:
                - { name: LAB_DOMAIN, value: "203-0-113-10.sslip.io" }
              command: ["/bin/bash", "-ceu"]
              args:
                - |
                  D="$LAB_DOMAIN"
                  CFG="
                  autocert: true
                  autocert_dir: /data/autocert
                  metrics_address: \":9902\"
                  authenticate_service_url: https://authenticate.$D
                  idp_provider: oidc
                  idp_provider_url: https://id.$D/dex
                  idp_client_id: pomerium
                  idp_client_secret: pomerium-secret-lab
                  idp_scopes: [openid, profile, email]
                  ssh_address: \":2222\"
                  ssh_user_ca_key_file: /ssh/user_ca
                  ssh_host_key_files: [/ssh/host_ed25519, /ssh/host_rsa, /ssh/host_ecdsa]
                  routes:
                    - from: https://id.$D
                      to: http://dex.identity.svc:5556
                      allow_public_unauthenticated_access: true
                      preserve_host_header: true
                    - from: https://whoami.$D
                      to: http://whoami.pomerium.svc:80
                      allowed_users: [alice@talu.local]
                    - from: https://vms.$D
                      to: http://kubevirt-manager.kubevirt-manager.svc.cluster.local:8080
                      allowed_users: [alice@talu.local]
                      allow_websockets: true
                    - from: https://perses.$D
                      to: http://talu.monitoring.svc.cluster.local:8080
                      allowed_users: [alice@talu.local]
                      allow_websockets: true
                    - from: https://hubble.$D
                      to: http://hubble-ui.kube-system.svc.cluster.local:80
                      allowed_users: [alice@talu.local]
                      allow_websockets: true
                  "
                  # ssh://<vm> routes from talu.io/ssh-expose Services
                  while read -r vm svc ns au _; do
                    [ -z "$vm" ] && continue
                    au=${au:-alice@talu.local}
                    CFG="${CFG}
                    - from: ssh://${vm}
                      to: ssh://${svc}.${ns}.svc.cluster.local:22
                      policy: [{ allow: { and: [{ email: { in: [${au}] } }] } }]"
                  done < <(kubectl get svc -A -l talu.io/ssh-expose=true \
                    -o jsonpath='{range .items[*]}{.metadata.labels.talu\.io/vm}{" "}{.metadata.name}{" "}{.metadata.namespace}{" "}{.metadata.annotations.talu\.io/allowed-users}{"\n"}{end}')
                  # https://<ns>-dashboard.<domain> routes from talu.io/dashboard-expose Services
                  while read -r svc ns au _; do
                    [ -z "$svc" ] && continue
                    au=${au:-alice@talu.local}
                    CFG="${CFG}
                    - from: https://${ns}-dashboard.${D}
                      to: http://${svc}.${ns}.svc.cluster.local:8080
                      allowed_users: [${au}]
                      allow_websockets: true"
                  done < <(kubectl get svc -A -l talu.io/dashboard-expose=true \
                    -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.namespace}{" "}{.metadata.annotations.talu\.io/allowed-users}{"\n"}{end}')
                  # optional apex landing (https://<domain>, public) from talu.io/landing-expose Services
                  while read -r svc ns _; do
                    [ -z "$svc" ] && continue
                    CFG="${CFG}
                    - from: https://${D}
                      to: http://${svc}.${ns}.svc.cluster.local:80
                      allow_public_unauthenticated_access: true"
                  done < <(kubectl get svc -A -l talu.io/landing-expose=true \
                    -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.namespace}{"\n"}{end}')
                  OLD=$(kubectl -n pomerium get cm pomerium-config -o jsonpath='{.data.config\.yaml}' 2>/dev/null || true)
                  if [ "$CFG" != "$OLD" ]; then
                    kubectl -n pomerium create cm pomerium-config --from-literal=config.yaml="$CFG" \
                      --dry-run=client -o yaml | kubectl apply -f -
                    kubectl -n pomerium rollout restart deploy/pomerium
                    echo "pomerium routes updated"
                  else
                    echo "no change"
                  fi
