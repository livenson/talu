# Small in-cluster OCI registry the platform pushes the talu-tenant chart to.
# Lab-grade (http, no auth). Production: use the adopter's registry / a HelmRepository source instead.
apiVersion: apps/v1
kind: Deployment
metadata: { name: registry, namespace: flux-system }
spec:
  replicas: 1
  selector: { matchLabels: { app: registry } }
  template:
    metadata: { labels: { app: registry } }
    spec:
      containers:
        - name: registry
          image: registry:2
          ports: [{ containerPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata: { name: registry, namespace: flux-system }
spec:
  selector: { app: registry }
  ports: [{ name: oci, port: 5000, targetPort: 5000 }]
# ClusterIP: OCIRepository pulls from registry.flux-system.svc:5000 (in-cluster), and we push from
# inside the cluster. (A NodePort would also be reachable from the host — the host routes to the
# talos-docker node's eth0 over the podman bridge and Cilium's eBPF NodePort forwards it; add one if
# you need host/off-cluster pushes.)
