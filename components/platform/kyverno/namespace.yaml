apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    app.kubernetes.io/part-of: talu
    # Kyverno's controllers are restricted-PSA compliant (non-root, no hostPath), so the
    # cluster-wide `baseline` default is fine — no privileged label needed (unlike velero/tetragon).
    # This namespace is excluded from Talu's own policies (see policies/*) so the engine can never
    # deadlock its own admission path.
