apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Optional lab/demo landing page. Deploy with:  kubectl apply -k components/platform/portal
# It lives in the pomerium namespace (to read pomerium-config) and self-registers the apex route via
# the talu.io/landing-expose label. NOT part of any environment overlay — opt-in only.
namespace: pomerium
resources:
  - deployment.yaml
  - service.yaml
configMapGenerator:
  - name: talu-portal-app
    files:
      - portal.py
