# Loki — the log store for the audit tier (grafana/loki chart, SingleBinary mode, filesystem storage).
# Small and single-node for the lab; production swaps to object storage + scalable mode. Retention is
# short by default (audit logs can be shipped elsewhere for long-term retention).
deploymentMode: SingleBinary

loki:
  auth_enabled: false                 # single-tenant; Pomerium fronts the UI, not Loki directly
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index: { prefix: index_, period: 24h }
  limits_config:
    retention_period: 336h            # 14 days
    allow_structured_metadata: true
    volume_enabled: true
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  # keep it quiet on a tiny node
  ingester:
    chunk_encoding: snappy

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 8Gi
    storageClassName: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }

# Zero out everything the SingleBinary mode doesn't use (the chart defaults to the scalable topology).
read: { replicas: 0 }
write: { replicas: 0 }
backend: { replicas: 0 }
gateway: { enabled: false }
chunksCache: { enabled: false }
resultsCache: { enabled: false }
lokiCanary: { enabled: false }
minio: { enabled: false }
test: { enabled: false }
