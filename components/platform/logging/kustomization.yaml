apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Logging / audit tier: Loki (store) + Grafana Alloy (collector). Loki + Alloy are helm charts
# installed by ansible/roles/logging (the *-values.yaml here are their values). The audit VIEW is
# NATIVE PERSES — a Loki datasource + a LogsTable dashboard (Perses ships the Loki plugins), so no
# Grafana. These Perses CRs target the operator Perses in `monitoring` via instanceSelector.
resources:
  - namespace.yaml
  - loki-datasource.yaml
  - loki-ingress-policy.yaml
  - dashboard-audit.yaml
  - dashboard-vmlogs.yaml
