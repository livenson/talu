# perses-operator — manages the Perses server + syncs PersesDashboard/PersesDatasource CRs into it
# (a Kubernetes namespace maps to a Perses "project"). Requires cert-manager for its webhook certs,
# which Talu's access plane already provides.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: perses-operator
  namespace: monitoring
spec:
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: perses-operator
      version: "0.4.0"
      sourceRef:
        kind: HelmRepository
        name: perses
        namespace: monitoring
