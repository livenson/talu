# ServiceMonitors for the Talu-specific metric sources that don't ship their own.
# (kube-state-metrics + node-exporter come from the kube-prometheus-stack chart.)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubevirt
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: talu
spec:
  # KubeVirt's virt-operator publishes a headless `kubevirt-prometheus-metrics` Service exposing
  # per-VMI metrics (kubevirt_vmi_*) over TLS; labels/ports confirmed against the running cluster.
  namespaceSelector:
    matchNames: [kubevirt]
  selector:
    matchLabels:
      prometheus.kubevirt.io: "true"
  endpoints:
    - port: metrics
      scheme: https
      interval: 30s
      honorLabels: true
      tlsConfig:
        insecureSkipVerify: true
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pomerium
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: talu
spec:
  # Pomerium exposes Envoy `envoy_*` + Pomerium `pomerium_*` metrics on :9902 (metrics_address in the
  # config). The Service must publish a named `metrics` port on 9902 (identity_pomerium role / the
  # route-sync config set metrics_address). Feeds the Access & Identity dashboard.
  namespaceSelector:
    matchNames: [pomerium]
  selector:
    matchLabels:
      app: pomerium
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: talu
spec:
  # cert-manager's controller Service exposes certmanager_* on :9402 (port `http-metrics`) — verified
  # on the lab. Without this scrape the TaluCertExpiringSoon alert (resource-rules.yaml) has no series.
  # Select the CONTROLLER only (cainjector/webhook share :9402 but don't publish cert-expiry metrics).
  namespaceSelector:
    matchNames: [cert-manager]
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
      app.kubernetes.io/component: controller
  endpoints:
    - port: http-metrics
      interval: 60s
      path: /metrics
