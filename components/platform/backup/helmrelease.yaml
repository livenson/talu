apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      # chart 12.1.0 == app v1.18.1, the version validated on the lab
      version: "12.1.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3 }
  valuesFrom:
    - kind: ConfigMap
      name: velero-values
