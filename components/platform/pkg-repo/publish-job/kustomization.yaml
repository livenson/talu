apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# On-demand publish Job (NOT part of the base pkg-repo kustomization). Apply to (re)build + sign +
# publish the talu-ca-trust package. The signing key comes from Secret talu-pkg-signing (key
# private.asc); create it once:  kubectl -n golden-images create secret generic talu-pkg-signing \
#   --from-file=private.asc=<your-armored-private-key>
#   kubectl delete -k components/platform/pkg-repo/publish-job 2>/dev/null; \
#   kubectl apply  -k components/platform/pkg-repo/publish-job
namespace: golden-images
resources:
  - job.yaml
# The Job names its container image `talu-pkg-builder` (a logical name). Here in the base it resolves to
# fedora:41 — which pulls anywhere (incl. the lab) and installs the toolchain at start. A production
# overlay remaps it to a published images/pkg-builder (toolchain baked → non-root, no runtime install):
#   images: [{ name: talu-pkg-builder, newName: ghcr.io/you/talu-pkg-builder, newTag: latest }]
images:
  - name: talu-pkg-builder
    newName: registry.fedoraproject.org/fedora
    newTag: "41"
