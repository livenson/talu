apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# In-cluster package repo for the talu-ca-trust package (mutable-guest CA-trust delivery). Co-located
# with zot in the golden-images namespace. Deploy with:  kubectl apply -k components/platform/pkg-repo
# (the golden-images Namespace comes from components/infrastructure/cdi/catalog.yaml — apply that first).
namespace: golden-images
resources:
  - pkg-repo.yaml
